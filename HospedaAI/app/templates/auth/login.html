{% extends 'base.html' %}
{% block content %}
<h2>Iniciar sesión</h2>
<form method="post">
  {{ form.hidden_tag() }}
  <div class="mb-3">
    {{ form.correo.label }} {{ form.correo(class="form-control") }}
  </div>
  <div class="mb-3">
    {{ form.password.label }} {{ form.password(class="form-control") }}
  </div>
  <button type="submit" class="btn btn-primary">Iniciar sesión</button>
</form>
{% endblock %}
