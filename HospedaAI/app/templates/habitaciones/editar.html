{% extends "base.html" %}

{% block content %}

<h2>Editar Habitación</h2>

<form method="POST">

    <div class="mb-3">
        <label>Número</label>
        <input type="text" name="numero" class="form-control" value="{{ habitacion.numero }}">
    </div>

    <div class="mb-3">
        <label>Piso</label>
        <input type="number" name="piso" class="form-control" value="{{ habitacion.piso }}">
    </div>

    <div class="mb-3">
        <label>Estado</label>
        <select name="estado" class="form-control">

            <option value="disponible" {% if habitacion.estado == 'disponible' %}selected{% endif %}>
                Disponible
            </option>

            <option value="ocupada" {% if habitacion.estado == 'ocupada' %}selected{% endif %}>
                Ocupada
            </option>

            <option value="mantenimiento" {% if habitacion.estado == 'mantenimiento' %}selected{% endif %}>
                Mantenimiento
            </option>

        </select>
    </div>

    <button class="btn btn-primary">Actualizar</button>
    <a href="/habitaciones" class="btn btn-secondary">Cancelar</a>

</form>

{% endblock %}
