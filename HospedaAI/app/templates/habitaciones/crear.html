{% extends "base.html" %}

{% block content %}
<section class="crud-page">
    <div class="container">
        <div class="crud-form-card">
            <div class="crud-form-header">
                <p class="section-eyebrow">Gestion hotelera</p>
                <h1 class="section-title">Crear habitacion</h1>
                <p class="crud-subtitle">Ingresa los datos principales para registrar una nueva habitacion.</p>
            </div>

            <form method="POST" class="crud-form">
                <div class="form-group-luxury">
                    <label>Numero</label>
                    <input type="text" name="numero" class="input-luxury" required>
                </div>

                <div class="form-group-luxury">
                    <label>Estado</label>
                    <select name="estado" class="input-luxury select-luxury">
                        <option value="disponible">Disponible</option>
                        <option value="ocupada">Ocupada</option>
                        <option value="mantenimiento">Mantenimiento</option>
                    </select>
                </div>

                <div class="form-group-luxury">
                    <label>Tipo de habitacion</label>
                    <select name="tipo_id" class="input-luxury select-luxury" required>
                        {% for t in tipos %}
                        <option value="{{ t.id }}">
                            {{ t.nombre }} | {{ t.capacidad }} personas | ${{ t.precio_noche }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="crud-form-actions">
                    <button class="btn-gold" type="submit">Guardar habitacion</button>
                    <a href="{{ url_for('habitaciones.listar') }}" class="btn-ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
