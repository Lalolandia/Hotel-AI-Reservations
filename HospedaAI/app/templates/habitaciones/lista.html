{% extends "base.html" %}

{% block content %}

<h2>Habitaciones</h2>

<a href="/habitaciones/crear" class="btn btn-primary mb-3">
    Nueva Habitación
</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Número</th>
            <th>Piso</th>
            <th>Estado</th>
            <th>Tipo</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for h in habitaciones %}
        <tr>
            <td>{{ h.id }}</td>
            <td>{{ h.numero }}</td>
            <td>{{ h.piso }}</td>
            <td>{{ h.estado }}</td>
            <td>{{ h.tipo_habitacion.nombre }}</td>

            <td>
                <a href="/habitaciones/editar/{{ h.id }}" class="btn btn-warning btn-sm">Editar</a>

                <a href="/habitaciones/eliminar/{{ h.id }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar habitación?')">
                   Eliminar
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
