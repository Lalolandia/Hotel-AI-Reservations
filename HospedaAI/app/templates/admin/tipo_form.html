{% extends "admin/base_admin.html" %}
{% block title %}{{ accion }} tipo — Admin{% endblock %}
{% block page_title %}{{ accion }} tipo de habitación{% endblock %}

{% block content %}
<div class="admin-form-card">
  <h4>{{ accion }} tipo de habitación</h4>
  <form method="POST">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" name="nombre" required value="{{ tipo.nombre if tipo else '' }}" placeholder="ej: Suite Presidencial">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea name="descripcion">{{ tipo.descripcion if tipo else '' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Precio por noche ($) *</label>
        <input type="number" name="precio_noche" step="0.01" min="0" required value="{{ tipo.precio_noche if tipo else '' }}" placeholder="150.00">
      </div>
      <div class="form-group">
        <label>Capacidad *</label>
        <input type="number" name="capacidad" min="1" required value="{{ tipo.capacidad if tipo else '' }}" placeholder="2">
      </div>
    </div>
    <div class="form-group">
      <label>URL de imagen (Supabase Storage)</label>
      <input type="url" name="imagen" value="{{ tipo.imagen if tipo else '' }}" placeholder="https://xxx.supabase.co/storage/v1/object/public/rooms/imagen.png">
      {% if tipo and tipo.imagen %}
      <div style="margin-top:10px"><img src="{{ tipo.imagen }}" style="height:80px;border-radius:8px;object-fit:cover"></div>
      {% endif %}
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-admin-gold"><i class="fa fa-floppy-disk"></i> {{ accion }}</button>
      <a href="{{ url_for('admin.listar_tipos') }}" class="btn-admin-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
