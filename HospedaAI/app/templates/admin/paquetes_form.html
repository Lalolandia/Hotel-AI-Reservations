{% extends "admin/base_admin.html" %}
{% block title %}{{ accion }} paquete — Admin{% endblock %}
{% block page_title %}{{ accion }} paquete{% endblock %}

{% block content %}
<div class="admin-form-card">
  <h4>{{ accion }} paquete turístico</h4>
  <form method="POST">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" name="nombre" required value="{{ paquete.nombre if paquete else '' }}" placeholder="ej: Luna de Miel">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea name="descripcion">{{ paquete.descripcion if paquete else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Precio total ($) *</label>
      <input type="number" name="precio_total" step="0.01" min="0" required value="{{ paquete.precio_total if paquete else '' }}" placeholder="350.00">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-admin-gold"><i class="fa fa-floppy-disk"></i> {{ accion }}</button>
      <a href="{{ url_for('admin.listar_paquetes') }}" class="btn-admin-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
