<div class="card room-card h-100 shadow-sm">
  <img src="{{ url_for('static', filename='img/rooms/' ~ room.image) }}" class="card-img-top" loading="lazy" alt="{{ room.nombre }}">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ room.nombre }}</h5>
    <p class="card-text text-muted small">{{ room.descripcion_corta }}</p>
    <ul class="list-inline small text-muted mb-2">
      <li class="list-inline-item"><i class="fa fa-user"></i> {{ room.capacidad }}</li>
      <li class="list-inline-item">•</li>
      <li class="list-inline-item"><i class="fa fa-bed"></i> {{ room.camas }}</li>
    </ul>
    <div class="mt-auto d-flex justify-content-between align-items-center">
      <div class="price">
        <span class="h5 m-0">${{ room.precio_noche }}</span><small class="text-muted"> / noche</small>
      </div>
      <a href="{{ url_for('main.room_detail', room_id=room.id) }}" class="btn btn-outline-primary">Ver</a>
    </div>
  </div>
</div>
